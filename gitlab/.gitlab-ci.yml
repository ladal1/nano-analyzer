stages:
  - security

variables:
  NANO_GITLAB_IMAGE: registry.gitlab.com/your-group/your-project/nano-analyzer:latest
  NANO_GITLAB_RESOURCE_GROUP: nano-analyzer-mr

nano_analyzer_mr:
  stage: security
  image: $NANO_GITLAB_IMAGE
  resource_group: $NANO_GITLAB_RESOURCE_GROUP
  variables:
    NANO_GITLAB_SCAN_MODE: changed
    NANO_GITLAB_ENFORCE_ONCE_PER_COMMIT: "true"
    NANO_GITLAB_REOPEN_RESOLVED_THREAD: "true"
  script:
    - python3 gitlab/run_mr_scan.py
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - when: never
  artifacts:
    when: always
    paths:
      - .nano-analyzer/gitlab/
    expire_in: 1 week
